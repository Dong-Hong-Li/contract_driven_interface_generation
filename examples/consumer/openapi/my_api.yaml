                $ref: '#/components/schemas/internal_modules_user_httpapi.MeAPIResponse'
          description: 用户信息
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - Users
    put:
      description: 更新当前登录用户的个人资料
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.UpdateMeRequest'
                description: 用户信息
                summary: request
        description: 用户信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_modules_user_httpapi.MeAPIResponse'
          description: 更新成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 参数错误
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
      security:
      - BearerAuth: []
      summary: 更新当前用户信息
