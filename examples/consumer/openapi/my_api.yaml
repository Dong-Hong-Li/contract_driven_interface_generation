  /health:
    get:
      description: 检查服务器运行状态
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.HealthCheckResponse'
          description: 服务正常
      summary: 健康检查
      tags:
      - Health
  /payments/notify:
    post:
      description: 处理第三方支付平台的回调通知
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: success
        "400":
          content:
            text/plain:
              schema:
                type: string
          description: fail
      summary: 支付回调通知
      tags:
      - Payments
servers:
- url: localhost:8080/api
