  /auth/refresh:
    post:
      description: 使用刷新令牌获取新的访问令牌
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - properties:
                  refreshToken:
                    type: string
                title: request
                type: object
        description: 刷新令牌
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_modules_user_httpapi.AuthTokenAPIResponse'
          description: 令牌刷新成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 刷新令牌无效
      summary: 刷新JWT令牌
      tags:
      - Auth
  /auth/register:
    post:
      description: 注册新用户账号
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.RegisterRequest'
                description: 注册信息
