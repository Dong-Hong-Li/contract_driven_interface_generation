  /auth/login:
    post:
      description: 用户登录获取JWT token
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.LoginRequest'
                description: 登录信息
                summary: request
        description: 登录信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_modules_user_httpapi.AuthTokenAPIResponse'
          description: 登录成功
        "401":
          content:
            application/json:
