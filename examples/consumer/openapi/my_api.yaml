externalDocs:
  description: ""
  url: ""
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: 拍卖与交易平台后端 REST API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: BidBay Shop Backend API
  version: "1.0"
openapi: 3.1.0
paths:
  /admin/auction/pool:
    get:
      description: 获取平台拍卖奖池的余额信息
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.AuctionPoolResponse'
          description: 奖池信息
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 获取拍卖奖池信息
      tags:
      - Admin
  /admin/auction/rules:
    get:
      description: 获取当前的拍卖规则配置信息
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.AuctionRulesResponse'
          description: 拍卖规则配置
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 获取拍卖规则配置
      tags:
      - Admin
    put:
      description: 更新拍卖规则的各项配置参数
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.UpdateAuctionRulesRequest'
                title: request
        description: 拍卖规则配置
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.AuctionRulesResponse'
          description: 更新成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 参数错误
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 更新拍卖规则配置
      tags:
      - Admin
  /admin/auctions:
    get:
      description: 管理员获取所有拍卖的分页列表
      parameters:
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: pageSize
        schema:
          default: 20
          type: integer
      - description: 拍卖状态
        in: query
        name: status
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.AdminAuctionListResponse'
          description: 拍卖列表
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 获取所有拍卖列表（管理员）
      tags:
      - Admin
    post:
      description: 管理员创建新的拍卖
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.CreateAuctionRequest'
                description: 拍卖信息
                summary: request
        description: 拍卖信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.AuctionResponse'
          description: 拍卖创建成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 参数错误
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 创建拍卖
      tags:
      - Admin
  /admin/auctions/{id}:
    delete:
      description: 管理员删除拍卖
      parameters:
      - description: 拍卖ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.SuccessResponse'
          description: 删除成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 拍卖ID无效
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 非管理员
      security:
      - BearerAuth: []
      summary: 删除拍卖
      tags:
      - Admin
    put:
      description: 管理员更新拍卖信息
      parameters:
      - description: 拍卖ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.UpdateAuctionRequest'
                title: request
        description: 拍卖更新信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.SuccessResponse'
          description: 更新成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 参数错误
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
        "403":
          content:
            application/json:
              schema:
