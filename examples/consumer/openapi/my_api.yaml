      description: 将指定地址设为默认收货地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_modules_user_httpapi.AddressAPIResponse'
          description: 设置成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 地址不存在
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ApiResponse'
          description: 未授权
      security:
      - BearerAuth: []
      summary: 设为默认地址
      tags:
      - Users
  /app/users/me:
